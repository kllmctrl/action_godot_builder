name: 🚀 Create Release
on:
  workflow_call:
    inputs:
      base-branch:
        description: 'Base branch to use for the builds'
        type: string
      lto:
        description: 'LTO mode. Options: "none", "thin", "full"'
        type: string
      repo:
        description: 'Repository to use for the build'
        type: string
      release_repo:
        description: 'Repository to use for the release'
        type: string
        default: ''
      tag:
        description: 'tag to use for the build'
        type: string
      tag_release:
        description: 'tag to use for releasing the build'
        type: string
      module_flags:
        description: 'Extra module flags, e.g. module_webm_enabled=no'
        type: string
      template_module_flags:
        description: 'Extra module flags for template build, e.g. module_webm_enabled=no'
        type: string

# Global Settings
env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GODOT_BASE_BRANCH: ${{ inputs.base-branch }}
  SCONSFLAGS: verbose=yes warnings=extra werror=yes strict_checks=yes debug_symbols=no ${{ inputs.module_flags }}

jobs:
  release:
    name: 🚀 Create Web Release
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.tag }}
          submodules: recursive

      - uses: actions/download-artifact@v8
        with:
          path: bin
          merge-multiple: true

      - name: List downloaded bin
        run: ls -R bin

      - name: Package Web Templates
        run: |
          mkdir -p release/templates
          VERSION=${{ inputs.tag_release }}
          VERSION_CLEAN=${VERSION//-/.}

          echo "📦 开始打包 Web 模板..."

          # ============================================================
          # 复制 Release 模板（带 threads）
          # ============================================================
          if [ -f bin/godot.web.template_release.wasm32.zip ]; then
            cp bin/godot.web.template_release.wasm32.zip "release/templates/web_release.zip"
            echo "✅ 复制 web_release.zip"
          else
            echo "⚠️ 未找到 godot.web.template_release.wasm32.zip"
            # 尝试找 wasm64 版本（兼容旧版命名）
            if [ -f bin/godot.web.template_release.wasm64.zip ]; then
              cp bin/godot.web.template_release.wasm64.zip "release/templates/web_release.zip"
              echo "✅ 复制 web_release.zip (wasm64)"
            fi
          fi

          # ============================================================
          # 复制 Debug 模板（带 threads）
          # ============================================================
          if [ -f bin/godot.web.template_debug.wasm32.zip ]; then
            cp bin/godot.web.template_debug.wasm32.zip "release/templates/web_debug.zip"
            echo "✅ 复制 web_debug.zip"
          else
            echo "⚠️ 未找到 godot.web.template_debug.wasm32.zip"
            if [ -f bin/godot.web.template_debug.wasm64.zip ]; then
              cp bin/godot.web.template_debug.wasm64.zip "release/templates/web_debug.zip"
              echo "✅ 复制 web_debug.zip (wasm64)"
            fi
          fi

          # ============================================================
          # 写入版本信息
          # ============================================================
          printf "%s" "${VERSION_CLEAN}" > release/templates/version.txt

          # ============================================================
          # 打包成 tpz 格式（Godot 导出模板标准格式）
          # ============================================================
          cd release
          zip -q -r Godot_v${VERSION}_web_export_templates.tpz templates
          cd ..

          echo "✅ Web 模板打包完成"
          echo ""
          echo "📋 打包内容："
          ls -la release/templates/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}-${{ inputs.tag_release }}_web-only
          name: "Godot Web Only ${{ inputs.tag_release }}"
          repository: ${{ inputs.release_repo != '' && inputs.release_repo || github.repository }}
          token: ${{ secrets.GH_TOKEN }}
          body: |
            ## 🎯 Web Only 导出模板
            
            - Godot 版本: ${{ inputs.tag_release }}
            - 优化模式: ${{ inputs.lto }}
            - 裁剪配置: ${{ inputs.template_module_flags }}
            - 构建分支: ${{ inputs.base-branch }}
            
            ### 📦 包含内容
            - ✅ Web Release 模板（带 threads 支持）
            - ✅ Web Debug 模板（带 threads 支持）
            - ✅ 适用于纯 2D 项目（3D 已裁剪）
          files: |
            release/Godot_v${{ inputs.tag_release }}_web_export_templates.tpz